name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json
      - name: Install workspace dependencies
        run: npm ci
      - name: Install API dependencies
        # The lock file is authored on Windows; npm resolves Linux-only optional
        # native packages on the runner before validation.
        run: npm install --prefix backend --no-audit --no-fund
      - name: Install web dependencies
        run: npm install --prefix frontend --no-audit --no-fund
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm run test --prefix backend -- --runInBand
      - name: API integration tests
        run: npm run test:e2e --prefix backend -- --runInBand
